<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métricas do Manychat</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e1b4b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --c-blue: #3b82f6;
            --c-purple: #8b5cf6;
            --c-pink: #ec4899;
            --c-green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .funnel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            opacity: 0.5;
        }

        .card.c-blue::before { background: var(--c-blue); opacity: 1; }
        .card.c-purple::before { background: var(--c-purple); opacity: 1; }
        .card.c-pink::before { background: var(--c-pink); opacity: 1; }
        .card.c-green::before { background: var(--c-green); opacity: 1; }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .card-value {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .card-percent {
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .chart-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        @media (min-width: 900px) {
            .chart-section {
                grid-template-columns: 1fr 1fr;
            }
        }

        .chart-container {
            height: 350px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .details-table th, .details-table td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        .details-table th {
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .details-table td {
            font-size: 1.1rem;
        }

        .details-table tr:last-child td {
            border-bottom: none;
        }
        
        .loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient-start);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--c-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="loading" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--text-secondary);">Carregando dados do Google Sheets...</p>
    </div>

    <div class="container">
        <header>
            <h1>Métricas do Manychat</h1>
            <p style="margin-bottom: 20px;">Painel de Acompanhamento</p>
